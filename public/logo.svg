<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sathish Muthu monogram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12a3b0"/>
      <stop offset="0.55" stop-color="#0e7c86"/>
      <stop offset="1" stop-color="#0b4a63"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4c14e"/>
      <stop offset="1" stop-color="#e0993a"/>
    </linearGradient>
  </defs>
  <!-- badge -->
  <rect x="6" y="6" width="108" height="108" rx="28" fill="url(#bg)"/>
  <rect x="6" y="6" width="108" height="108" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
  <!-- gold underline accent -->
  <rect x="34" y="86" width="52" height="4.5" rx="2.25" fill="url(#gold)"/>
  <!-- bold serif SM -->
  <text x="60" y="70" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Playfair Display', serif"
        font-size="60" font-weight="700" letter-spacing="-2"
        fill="#ffffff">SM</text>
</svg>
